<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resizable Boxes</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Resizable Boxes</h1>
    <p class="subtitle">Drag the bottom-right corner of each box to resize</p>

    <div class="container">
        <div class="box box-1">
            <span>Box 1</span>
            <span class="size-info">200 x 200</span>
        </div>
        <div class="box box-2">
            <span>Box 2</span>
            <span class="size-info">200 x 200</span>
        </div>
        <div class="box box-3">
            <span>Box 3</span>
            <span class="size-info">200 x 200</span>
        </div>
        <div class="box box-4">
            <span>Box 4</span>
            <span class="size-info">200 x 200</span>
        </div>
        <div class="box box-5">
            <span>Box 5</span>
            <span class="size-info">420 x 180</span>
        </div>
        <div class="box box-6">
            <span>Box 6</span>
            <span class="size-info">420 x 180</span>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
